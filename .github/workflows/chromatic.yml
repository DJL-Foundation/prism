name: 📚 Chromatic

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: 📥 Install dependencies
        run: bun install

      - name: ⚙️ Setup environment
        run: cp .env.example .env

      - name: 🔨 & 🚀 Build and Publish to Chromatic
        run: SKIP_ENV_VALIDATION=1 bun run chromatic --project-token ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
